<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carl Studio · 内容后台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --g:       #1A7A3C;
  --g2:      #2C9E56;
  --g3:      #7ED4A0;
  --gd:      #0F4A24;
  --gp:      #EDF7F1;
  --gp2:     #D4EEE0;
  --gold:    #C8973A;
  --goldt:   #FFF3DC;
  --ink:     #111111;
  --ink2:    #444444;
  --ink3:    #888888;
  --ink4:    #BBBBBB;
  --bg:      #F5F7F5;
  --card:    #FFFFFF;
  --border:  #E0E8E3;
  --border2: #C8DDD0;
  --r:       14px;
  --r2:      10px;
  --sh:      0 2px 16px rgba(26,122,60,.07);
  --sh2:     0 4px 24px rgba(26,122,60,.13);
  --red:     #E53935;
  --redp:    #FFEBEE;
  --blue:    #1565C0;
  --bluep:   #E3F2FD;
  --amber:   #E65100;
  --amberp:  #FFF3E0;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:90px;
  font-size:14px;
}

/* ── NAV ── */
nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 12px;
  cursor:pointer;
  border:none;background:none;
  color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  font-size:10px;gap:4px;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:22px;line-height:1;}

/* ── PAGES ── */
.page{display:none;padding:0 0 12px;}
.page.active{display:block;}

/* ── PAGE HEADER ── */
.page-header{
  background:var(--g);
  padding:52px 20px 20px;
  color:#fff;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(26,122,60,.25);
}
.page-header h1{
  font-family:'Noto Serif SC',serif;
  font-size:20px;font-weight:900;
  letter-spacing:.03em;
}
.page-header p{
  font-size:11px;color:rgba(255,255,255,.6);
  margin-top:3px;
}

/* ── SECTION ── */
.section{padding:16px 16px 0;}
.section-title{
  font-size:11px;font-weight:600;
  color:var(--ink3);letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.section-title::before{
  content:'';width:3px;height:14px;
  background:var(--g);border-radius:2px;
}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--sh);
  overflow:hidden;
}
.card+.card{margin-top:10px;}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-top:12px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-label{font-size:12px;color:rgba(255,255,255,.8);}
.prog-num{font-family:'DM Mono',monospace;font-size:12px;color:#7EEAAA;}
.prog-bar{background:rgba(255,255,255,.2);border-radius:99px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:#7EEAAA;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ══════════════════════════════════════════════════════
   PAGE 1: SHOTS CHECKLIST
══════════════════════════════════════════════════════ */
.filter-scroll{
  display:flex;gap:7px;padding:12px 16px;
  overflow-x:auto;scrollbar-width:none;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;top:110px;z-index:90;
  box-shadow:var(--sh);
}
.filter-scroll::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:5px 12px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--ink2);font-size:11px;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.chip.active{background:var(--g);border-color:var(--g);color:#fff;font-weight:500;}

.loc-group{margin:12px 16px 0;}
.loc-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);
  cursor:pointer;user-select:none;
  transition:all .15s;
  box-shadow:var(--sh);
}
.loc-head.open{border-color:var(--g);background:var(--gp);}
.loc-icon2{
  width:34px;height:34px;border-radius:8px;
  background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.loc-info{flex:1;min-width:0;}
.loc-name{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.loc-sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.loc-badge{
  font-family:'DM Mono',monospace;font-size:10px;
  background:var(--gp);color:var(--g);
  padding:3px 8px;border-radius:99px;
  border:1px solid rgba(26,122,60,.2);
  white-space:nowrap;flex-shrink:0;
}
.loc-arr{font-size:11px;color:var(--ink4);transition:transform .2s;flex-shrink:0;}
.loc-head.open .loc-arr{transform:rotate(90deg);}

.shots-list{display:none;flex-direction:column;gap:8px;padding:8px 0;}
.shots-list.open{display:flex;}

.shot-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  transition:border-color .15s;box-shadow:var(--sh);
}
.shot-card.done{border-color:var(--g2);background:var(--gp);}
.shot-head{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px;cursor:pointer;
}
.cb{
  width:20px;height:20px;border-radius:5px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  transition:all .15s;background:var(--card);
  cursor:pointer;
}
.shot-card.done .cb{background:var(--g);border-color:var(--g);}
.cb svg{opacity:0;transition:opacity .15s;}
.shot-card.done .cb svg{opacity:1;}
.shot-body{flex:1;min-width:0;}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.stag{
  font-size:9px;padding:2px 7px;border-radius:99px;
  font-weight:500;white-space:nowrap;
}
.t-early{background:#E8F4FD;color:#1A5C8A;}
.t-noon {background:#FFF3E0;color:#9A4400;}
.t-aft  {background:#EDE7F6;color:#4A2A7A;}
.t-eve  {background:#FCE4EC;color:#8A1A3A;}
.t-any  {background:#F3F3F3;color:#555;}
.t-launch{background:#FFF8E1;color:#8A5C00;border:1px solid #F0C840;}
.shot-scene{font-size:13px;font-weight:500;line-height:1.4;}
.shot-card.done .shot-scene{color:var(--g);text-decoration:line-through;text-decoration-color:var(--g3);}
.dev-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.dtag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;}
.d-dev{background:#EEF2FF;color:#3A4A9A;}
.d-ori{background:#FFF0F8;color:#8A2A6A;}
.expand-toggle{
  font-size:10px;color:var(--g);background:none;border:none;
  cursor:pointer;margin-top:7px;font-family:'Noto Sans SC',sans-serif;
  display:flex;align-items:center;gap:3px;padding:0;
}
.ea{display:inline-block;transition:transform .2s;}
.expand-toggle.open .ea{transform:rotate(90deg);}

.shot-detail{display:none;border-top:1px solid var(--border);}
.shot-detail.open{display:block;}
.det-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.det-sec:last-child{border-bottom:none;}
.det-label{
  font-size:9px;font-weight:600;color:var(--ink3);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:7px;display:flex;align-items:center;gap:5px;
}
.det-label::before{content:'';width:2px;height:10px;background:var(--g);border-radius:1px;}
.det-txt{font-size:12px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;}
.audio-box{
  background:var(--gp);border:1px solid rgba(26,122,60,.18);
  border-radius:8px;padding:10px 12px;
  font-size:12px;line-height:1.75;
  font-family:'Noto Serif SC',serif;
  white-space:pre-wrap;color:var(--gd);
}
.tip-box{
  background:#FFFBEA;border:1px solid #F0D060;
  border-radius:8px;padding:8px 11px;
  font-size:11px;color:#7A5500;line-height:1.6;
  margin-top:7px;white-space:pre-wrap;
}

/* ══════════════════════════════════════════════════════
   PAGE 2: IDEAS + AI SCRIPT
══════════════════════════════════════════════════════ */
.idea-input-wrap{
  margin:14px 16px 0;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;
}
.idea-top{padding:14px 14px 0;}
.idea-top label{
  font-size:11px;font-weight:600;color:var(--ink3);
  letter-spacing:.08em;display:block;margin-bottom:8px;
}
textarea#ideaInput{
  width:100%;border:none;outline:none;resize:none;
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  line-height:1.6;color:var(--ink);
  background:transparent;min-height:80px;
  padding:0;
}
textarea#ideaInput::placeholder{color:var(--ink4);}
.idea-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-top:1px solid var(--border);
  background:var(--gp);
}
.idea-hint{font-size:10px;color:var(--ink3);}
.btn-gen{
  background:var(--g);color:#fff;border:none;
  border-radius:99px;padding:8px 18px;
  font-family:'Noto Sans SC',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;}
.btn-gen:not(:disabled):active{transform:scale(.97);}

.ai-result{margin:12px 16px 0;display:none;}
.ai-result.show{display:block;}

.script-card{
  background:var(--card);border:1.5px solid var(--g);
  border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;
}
.script-header{
  background:var(--g);padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.script-header h3{
  color:#fff;font-family:'Noto Serif SC',serif;
  font-size:15px;font-weight:700;
}
.script-meta-tags{display:flex;gap:6px;flex-wrap:wrap;}
.smtag{
  font-size:9px;padding:2px 8px;border-radius:99px;
  background:rgba(255,255,255,.2);color:#fff;
}
.script-body{padding:14px;}
.script-section{margin-bottom:14px;}
.script-section:last-child{margin-bottom:0;}
.ss-label{
  font-size:9px;font-weight:700;color:var(--g);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;
}
.ss-content{
  font-size:13px;line-height:1.75;color:var(--ink2);
  white-space:pre-wrap;
}
.shot-item{
  background:var(--gp);border-radius:8px;
  padding:10px 12px;margin-bottom:7px;
  border-left:3px solid var(--g);
}
.shot-item:last-child{margin-bottom:0;}
.si-head{display:flex;gap:7px;align-items:center;margin-bottom:4px;}
.si-num{
  font-family:'DM Mono',monospace;font-size:9px;
  background:var(--g);color:#fff;padding:1px 6px;border-radius:3px;
}
.si-scene{font-size:12px;font-weight:500;color:var(--ink);}
.si-detail{font-size:11px;color:var(--ink2);line-height:1.6;}
.si-audio{
  font-size:11px;font-family:'Noto Serif SC',serif;
  color:var(--gd);margin-top:5px;
  background:rgba(26,122,60,.08);border-radius:5px;
  padding:5px 8px;
}
.btn-save{
  width:100%;margin-top:12px;
  background:var(--gp2);color:var(--g);
  border:1.5px solid var(--g);border-radius:var(--r2);
  padding:11px;font-family:'Noto Sans SC',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
.btn-save:active{background:var(--g);color:#fff;}

.saved-ideas{margin:14px 16px 0;}
.saved-idea-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r2);padding:12px 14px;
  box-shadow:var(--sh);margin-bottom:8px;
  cursor:pointer;transition:border-color .15s;
}
.saved-idea-card:active{border-color:var(--g);}
.sic-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.sic-idea{font-size:13px;font-weight:500;line-height:1.4;flex:1;}
.sic-del{
  font-size:16px;color:var(--ink4);background:none;border:none;
  cursor:pointer;flex-shrink:0;padding:0;line-height:1;
}
.sic-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.sic-tag{
  font-size:9px;padding:2px 7px;border-radius:99px;
  background:var(--gp);color:var(--g);border:1px solid rgba(26,122,60,.2);
}
.sic-date{font-size:9px;color:var(--ink4);margin-top:4px;font-family:'DM Mono',monospace;}

/* loading */
.loading{
  text-align:center;padding:30px;color:var(--ink3);
  font-size:13px;display:none;
}
.loading.show{display:block;}
.dot-anim{display:inline-flex;gap:4px;}
.dot-anim span{
  width:6px;height:6px;border-radius:99px;background:var(--g);
  animation:bounce .9s infinite ease-in-out;
}
.dot-anim span:nth-child(2){animation-delay:.15s;}
.dot-anim span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ══════════════════════════════════════════════════════
   PAGE 3: CALENDAR
══════════════════════════════════════════════════════ */
.cal-wrap{margin:14px 16px 0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;}
.cal-btn{
  background:none;border:1.5px solid var(--border);border-radius:8px;
  padding:6px 10px;font-size:13px;cursor:pointer;color:var(--ink2);
  transition:all .15s;
}
.cal-btn:active{background:var(--gp);border-color:var(--g);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{
  text-align:center;font-size:10px;font-weight:600;
  color:var(--ink3);padding:6px 0;letter-spacing:.05em;
}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;
  font-size:13px;position:relative;
  transition:all .15s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.cal-day:empty{cursor:default;}
.cal-day.today{background:var(--gp);color:var(--g);font-weight:700;}
.cal-day.has-post{font-weight:600;}
.cal-day .dot{
  width:5px;height:5px;border-radius:99px;
  background:var(--g);position:absolute;bottom:4px;
}
.cal-day.selected{background:var(--g);color:#fff;}
.cal-day.selected .dot{background:#fff;}
.cal-day:not(:empty):hover{background:var(--gp);}

.cal-detail{
  margin-top:12px;background:var(--card);
  border:1.5px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;
}
.cal-detail-header{
  padding:12px 14px;background:var(--gp);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cal-detail-header h3{
  font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;
}
.btn-add-post{
  background:var(--g);color:#fff;border:none;
  border-radius:99px;padding:6px 14px;
  font-size:11px;font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;
}
.post-list{padding:4px 0;}
.post-item{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;cursor:pointer;
}
.post-item:last-child{border-bottom:none;}
.post-status{
  width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-top:5px;
}
.st-draft{background:var(--ink4);}
.st-ready{background:var(--gold);}
.st-published{background:var(--g);}
.post-info{flex:1;}
.post-title{font-size:13px;font-weight:500;line-height:1.4;}
.post-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.post-tag{
  font-size:9px;padding:1px 6px;border-radius:99px;
  background:var(--gp);color:var(--g);
}
.post-tag.douyin{background:#FFE8E8;color:#CC0000;}
.post-tag.xiaohongshu{background:#FFE8F0;color:#CC0055;}
.post-del{
  font-size:16px;color:var(--ink4);background:none;border:none;
  cursor:pointer;padding:0;line-height:1;flex-shrink:0;
}
.empty-cal{
  padding:30px;text-align:center;
  color:var(--ink3);font-size:13px;
}

/* post modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:300;display:none;align-items:flex-end;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card);border-radius:var(--r) var(--r) 0 0;
  width:100%;max-height:85vh;overflow-y:auto;
  padding:20px 20px 40px;
}
.modal h2{
  font-family:'Noto Serif SC',serif;font-size:18px;
  font-weight:700;margin-bottom:16px;
}
.form-group{margin-bottom:14px;}
.form-group label{
  font-size:11px;font-weight:600;color:var(--ink3);
  letter-spacing:.08em;display:block;margin-bottom:6px;
}
.form-group input,.form-group select,.form-group textarea{
  width:100%;border:1.5px solid var(--border);border-radius:8px;
  padding:10px 12px;font-family:'Noto Sans SC',sans-serif;
  font-size:14px;color:var(--ink);background:var(--card);
  outline:none;transition:border-color .15s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--g);
}
.form-group textarea{min-height:70px;resize:none;}
.platform-btns{display:flex;gap:8px;}
.plt-btn{
  flex:1;padding:9px;border:1.5px solid var(--border);
  border-radius:8px;font-size:12px;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;background:var(--card);color:var(--ink2);
  transition:all .15s;text-align:center;
}
.plt-btn.active.douyin{background:#FFE8E8;border-color:#CC0000;color:#CC0000;}
.plt-btn.active.xhs{background:#FFE8F0;border-color:#CC0055;color:#CC0055;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-cancel{
  flex:1;padding:12px;border:1.5px solid var(--border);
  border-radius:var(--r2);background:none;font-size:13px;
  font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--ink2);
}
.btn-confirm{
  flex:2;padding:12px;background:var(--g);color:#fff;
  border:none;border-radius:var(--r2);font-size:13px;
  font-family:'Noto Sans SC',sans-serif;font-weight:600;cursor:pointer;
}

/* ══════════════════════════════════════════════════════
   PAGE 4: NOTES (灵感速记)
══════════════════════════════════════════════════════ */
.note-input-wrap{
  margin:14px 16px 0;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;
}
.note-input-top{padding:12px 14px 0;}
textarea#noteInput{
  width:100%;border:none;outline:none;resize:none;
  font-family:'Noto Sans SC',sans-serif;font-size:14px;
  line-height:1.6;color:var(--ink);background:transparent;
  min-height:90px;
}
textarea#noteInput::placeholder{color:var(--ink4);}
.note-input-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-top:1px solid var(--border);background:var(--gp);
}
.note-type-btns{display:flex;gap:5px;}
.ntbtn{
  font-size:10px;padding:3px 9px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--ink2);cursor:pointer;

.data-wrap{padding:14px 16px 0;}

/* platform toggle */

}

}

/* stat summary cards */

.sc-val{

.sc-val.green{color:var(--g);}

.sc-delta{

.delta-dn{color:var(--red);}

}
.btn-rec{
  background:var(--g);color:#fff;border:none;

  padding:12px 14px;border-bottom:1px solid var(--border);

}

.chart-metric-btns{display:flex;gap:5px;}
.cm-btn{

.cm-btn.active{background:var(--g);border-color:var(--g);color:#fff;}
.chart-body{padding:14px;}
.chart-svg-wrap{overflow-x:auto;scrollbar-width:none;}

/* records table */
.rec-table-wrap{

.rec-table-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;

}
.rec-table-header h3{font-size:13px;font-weight:600;color:var(--g);}
.rec-row{
  display:grid;grid-template-columns:72px 1fr 1fr 1fr 28px;

.rec-row:last-child{border-bottom:none;}

}
.rec-date-col{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);}
.rec-num{font-family:'DM Mono',monospace;text-align:right;}
.rec-del-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;color:var(--ink4);padding:0;

/* milestone */
.milestone-wrap{margin-bottom:14px;}
.milestone-card{

<script>
// ── UTILS ─────────────────────────────────────────────
function store(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function fmtDate(d){return d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});}

// ── NAV ───────────────────────────────────────────────
function switchPage(btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-'+btn.dataset.page).classList.add('active');
  window.scrollTo(0,0);
}

  {id:"gongcha",icon:"🍵",name:"贡茶",sub:"每天下午 · 每日积累",shots:[

    {id:"gc2",scene:"出镜说谈生意文化 — 第二条核心段落",time:"aft",tName:"🌇 下午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"你坐在贡茶，出镜，看镜头说话。\n\n拍摄角度：Pocket 3 固定桌上，略低于眼睛高度。",audio:"【口述·出镜】我刚来的时候，恨不得见一次面把合同谈完。但这里不行。第一次见面，聊你是谁，从哪来，喝茶。第二次聊货，聊量，喝茶。第三次才谈价格。\n\n我花了将近一年才明白——他们不是不想谈，他们在用这个时间判断你这个人值不值得做生意。",tip:"说话节奏放慢，每句话之间留半拍，这是全片信息密度最高的地方。"},

// ── SHOTS RENDER ─────────────────────────────────────
let currentFilter='all';
let shotIdx=0;
const filterDef=[
  {key:'all',label:'全部'},
  {key:'launch',label:'⭐ 引爆三条'},
  {key:'early',label:'☀️ 早晨'},
  {key:'noon',label:'🌤 上午/中午'},
  {key:'aft',label:'🌇 下午'},
  {key:'eve',label:'🌆 傍晚/夜晚'},
  {key:'any',label:'📌 随时'},
];

function timeClass(t){
  const m={early:'t-early',noon:'t-noon',aft:'t-aft',eve:'t-eve',any:'t-any'};
  return m[t]||'t-any';
}

function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML=filterDef.map(f=>`<button class="chip${f.key===currentFilter?' active':''}" data-f="${f.key}">${f.label}</button>`).join('');
  bar.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    currentFilter=c.dataset.f;
    renderFilterBar();
    renderShots();
  }));
}

function renderShots(){
  shotIdx=0;
  const content=document.getElementById('shotsContent');
  content.innerHTML='';
  LOCATIONS.forEach(loc=>{
    const filtered=loc.shots.filter(s=>{
      if(currentFilter==='all')return true;
      if(currentFilter==='launch')return s.launch;
      return s.time===currentFilter;
    });
    if(!filtered.length)return;

    const grp=document.createElement('div');
    grp.className='loc-group';

    const doneCnt=filtered.filter(s=>load('s_'+s.id)===1).length;

    grp.innerHTML=`
      <div class="loc-head" data-loc="${loc.id}">
        <div class="loc-icon2">${loc.icon}</div>
        <div class="loc-info">
          <div class="loc-name">${loc.name}</div>
          <div class="loc-sub">${loc.sub}</div>
        </div>
        <div class="loc-badge" id="lb_${loc.id}">${doneCnt}/${filtered.length}</div>
        <div class="loc-arr">▶</div>
      </div>
      <div class="shots-list" id="sl_${loc.id}"></div>
    `;

    const sl=grp.querySelector('.shots-list');
    const lh=grp.querySelector('.loc-head');
    lh.addEventListener('click',()=>{
      sl.classList.toggle('open');
      lh.classList.toggle('open');
    });

    filtered.forEach(s=>{
      shotIdx++;
      const isDone=load('s_'+s.id)===1;
      const card=document.createElement('div');
      card.className='shot-card'+(isDone?' done':'');
      card.dataset.id=s.id;
      card.innerHTML=`
        <div class="shot-head">
          <div class="cb">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="shot-body">
            <div class="tags-row">
              <span class="stag ${timeClass(s.time)}">${s.tName}</span>
              ${s.launch?'<span class="stag t-launch">⭐ 引爆三条</span>':''}
              <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4);background:var(--bg);padding:2px 6px;border-radius:3px;">#${String(shotIdx).padStart(2,'0')}</span>
            </div>
            <div class="shot-scene">${s.scene}</div>
            <div class="dev-row">
              <span class="dtag d-dev">📷 ${s.dev}</span>
              <span class="dtag d-ori">${s.ori}</span>
            </div>
            <button class="expand-toggle" data-id="${s.id}"><span class="ea">▶</span> 展开详情</button>
          </div>
        </div>
        <div class="shot-detail" id="sd_${s.id}">
          <div class="det-sec">
            <div class="det-label">画面内容 & 拍摄角度</div>
            <div class="det-txt">${s.visual}</div>
          </div>
          <div class="det-sec">
            <div class="det-label">台词 / 字幕 / 声音</div>
            <div class="audio-box">${s.audio}</div>
            ${s.tip?`<div class="tip-box">💡 ${s.tip}</div>`:''}
          </div>
        </div>
      `;

      card.querySelector('.cb').addEventListener('click',e=>{
        e.stopPropagation();
        const done=!card.classList.contains('done');
        card.classList.toggle('done',done);
        store('s_'+s.id,done?1:0);
        updateProgress();
        updateLocBadge(loc.id,filtered);
      });

      card.querySelector('.expand-toggle').addEventListener('click',e=>{
        e.stopPropagation();
        const det=document.getElementById('sd_'+s.id);
        const btn=card.querySelector('.expand-toggle');
        const open=det.classList.toggle('open');
        btn.classList.toggle('open',open);
        btn.innerHTML=`<span class="ea" style="${open?'transform:rotate(90deg)':''}">▶</span> ${open?'收起详情':'展开详情'}`;
      });

      sl.appendChild(card);
    });

    content.appendChild(grp);
  });
  updateProgress();
}

function updateLocBadge(locId,filtered){
  const el=document.getElementById('lb_'+locId);
  if(!el)return;
  const done=filtered.filter(s=>load('s_'+s.id)===1).length;
  el.textContent=`${done}/${filtered.length}`;
}

function updateProgress(){
  const allShots=LOCATIONS.flatMap(l=>l.shots);
  const total=allShots.length;
  const done=allShots.filter(s=>load('s_'+s.id)===1).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progNum').textContent=`${done} / ${total}`;
}

let currentNoteType='idea';

async function generateScript(){
  const input=document.getElementById('ideaInput').value.trim();
  if(!input){toast('请先输入你的想法或选题方向');return;}

  const btn=document.getElementById('btnGen');
  btn.disabled=true;
  document.getElementById('loadingEl').classList.add('show');
  document.getElementById('aiResult').classList.remove('show');

  const prompt=`你是「陈阳Carl」账号的内容策划，这是一个在摩洛哥卡萨布兰卡做外贸生意第6年的中国人运营的抖音/小红书账号。账号风格：真实感、克制叙事、在地视角、信息密度高、环境音优先、不说教不升华。可用设备：Pocket 3、大疆Nano、手机。

用户提供了以下选题方向或想法：
「${input}」

请你：
1. 分析这个方向在账号中的定位（流量层/信任层/陪伴感）
2. 给出一个具体的视频标题（抖音版）
3. 生成3-5个具体拍摄镜头，每个镜头包含：场景、画面内容、拍摄角度、台词/字幕/声音、推荐设备和横竖屏
4. 给出剪辑节奏关键提示（1-2句）
5. 给出小红书正文文案（100字以内）

请用以下JSON格式回复，只输出JSON，不要任何其他内容：
{
  "title": "视频标题",
  "positioning": "流量层/信任层/陪伴感，一句话说明为什么",
  "duration": "建议时长",
  "shots": [
    {
      "no": 1,
      "scene": "场景名称",
      "visual": "画面内容和拍摄角度",
      "audio": "台词/字幕/声音",
      "device": "推荐设备",
      "orient": "竖屏/横屏→裁竖"
    }
  ],
  "editTip": "剪辑节奏关键提示",
  "xhsCopy": "小红书正文文案"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const raw=data.content.map(i=>i.text||'').join('');
    const clean=raw.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    renderAIResult(parsed,input);
  }catch(e){
    document.getElementById('aiResult').innerHTML=`<div class="card" style="padding:16px;color:var(--red);">生成失败，请重试。${e.message}</div>`;
    document.getElementById('aiResult').classList.add('show');
  }finally{
    btn.disabled=false;
    document.getElementById('loadingEl').classList.remove('show');
  }
}

function renderAIResult(data,idea){
  const el=document.getElementById('aiResult');
  el.innerHTML=`
    <div class="script-card">
      <div class="script-header">
        <div>
          <h3>${data.title}</h3>
          <div style="font-size:10px;color:rgba(255,255,255,.7);margin-top:3px;">${data.positioning}</div>
        </div>
        <div class="script-meta-tags">
          <span class="smtag">${data.duration||'待定'}</span>
        </div>
      </div>
      <div class="script-body">
        <div class="script-section">
          <div class="ss-label">镜头脚本</div>
          ${(data.shots||[]).map(s=>`
            <div class="shot-item">
              <div class="si-head">
                <span class="si-num">#${s.no}</span>
                <span class="si-scene">${s.scene}</span>
              </div>
              <div class="si-detail">${s.visual}</div>
              <div class="si-audio">${s.audio}</div>
              <div class="dev-row" style="margin-top:5px;">
                <span class="dtag d-dev" style="font-size:9px;">📷 ${s.device}</span>
                <span class="dtag d-ori" style="font-size:9px;">${s.orient}</span>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="script-section">
          <div class="ss-label">剪辑提示</div>
          <div class="ss-content">${data.editTip}</div>
        </div>
        <div class="script-section">
          <div class="ss-label">小红书文案</div>
          <div class="audio-box">${data.xhsCopy}</div>
        </div>
        <button class="btn-save" onclick="saveScript(${JSON.stringify({idea,data}).replace(/"/g,'&quot;')})">保存这个脚本</button>
      </div>
    </div>
  `;
  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function saveScript(raw){
  let obj;
  try{obj=typeof raw==='string'?JSON.parse(raw.replace(/&quot;/g,'"')):raw;}
  catch(e){return;}
  const saved=load('saved_scripts',[]);
  saved.unshift({id:Date.now(),idea:obj.idea,data:obj.data,date:new Date().toLocaleDateString('zh-CN')});
  store('saved_scripts',saved);
  renderSaved();
  toast('脚本已保存 ✓');
}

function renderSaved(){
  const saved=load('saved_scripts',[]);
  const el=document.getElementById('savedList');
  if(!saved.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📝</div>还没有保存的脚本</div>';
    return;
  }
  el.innerHTML=saved.map(s=>`
    <div class="saved-idea-card" onclick="restoreScript('${s.id}')">
      <div class="sic-top">
        <div class="sic-idea">${s.data&&s.data.title?s.data.title:s.idea}</div>
        <button class="sic-del" onclick="event.stopPropagation();delScript(${s.id})">×</button>
      </div>
      <div class="sic-meta">
        ${s.data&&s.data.shots?`<span class="sic-tag">${s.data.shots.length}个镜头</span>`:''}
        ${s.data&&s.data.positioning?`<span class="sic-tag">${s.data.positioning.split('，')[0]}</span>`:''}
      </div>
      <div class="sic-date">${s.date}</div>
    </div>
  `).join('');
}

function restoreScript(id){
  const saved=load('saved_scripts',[]);
  const s=saved.find(x=>x.id==id);
  if(!s)return;
  document.getElementById('ideaInput').value=s.idea||'';
  renderAIResult(s.data,s.idea);
}

function delScript(id){
  let saved=load('saved_scripts',[]);
  saved=saved.filter(s=>s.id!=id);
  store('saved_scripts',saved);
  renderSaved();
  toast('已删除');
}

// ══════════════════════════════════════════════════════
let calDate=new Date();
let selectedDate=null;
let selectedPlatforms=[];

function changeMonth(d){
  calDate.setMonth(calDate.getMonth()+d);
  renderCal();
}

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calMonth').textContent=`${y}年${m+1}月`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach(d=>{
    const el=document.createElement('div');
    el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(y,m,1).getDay();
  const adj=first===0?6:first-1;
  for(let i=0;i<adj;i++){const el=document.createElement('div');el.className='cal-day';grid.appendChild(el);}
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const posts=load('cal_posts',{});
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');
    el.className='cal-day';
    el.textContent=d;
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate())el.classList.add('today');
    if(posts[key]&&posts[key].length)el.classList.add('has-post');
    if(selectedDate===key)el.classList.add('selected');
    const dot=document.createElement('div');dot.className='dot';
    if(posts[key]&&posts[key].length)el.appendChild(dot);
    el.addEventListener('click',()=>{selectedDate=key;renderCal();renderCalDetail(key);});
    grid.appendChild(el);
  }
}

function renderCalDetail(key){
  const posts=load('cal_posts',{})[key]||[];
  const d=new Date(key);
  document.getElementById('calDetailTitle').textContent=fmtDate(d);
  const el=document.getElementById('calPosts');
  if(!posts.length){el.innerHTML='<div class="empty-cal">这一天还没有发布计划<br><small>点击右上角「+ 添加」</small></div>';return;}
  el.innerHTML=`<div class="post-list">${posts.map(p=>`
    <div class="post-item">
      <div class="post-status st-${p.status}"></div>
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-tags">
          ${p.platforms.includes('douyin')?'<span class="post-tag douyin">抖音</span>':''}
          ${p.platforms.includes('xhs')?'<span class="post-tag xiaohongshu">小红书</span>':''}
          <span class="post-tag">${{draft:'草稿',ready:'待发布',published:'已发布'}[p.status]}</span>
        </div>
        ${p.note?`<div style="font-size:11px;color:var(--ink3);margin-top:3px;">${p.note}</div>`:''}
      </div>
      <button class="post-del" onclick="delPost('${key}',${p.id})">×</button>
    </div>
  `).join('')}</div>`;
}

function openModal(){
  if(!selectedDate){toast('请先选择日期');return;}
  document.getElementById('postTitle').value='';
  document.getElementById('postStatus').value='draft';
  document.getElementById('postNote').value='';
  selectedPlatforms=[];
  document.querySelectorAll('.plt-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function togglePlatform(btn){
  const plt=btn.dataset.plt;
  btn.classList.toggle('active');
  if(selectedPlatforms.includes(plt))selectedPlatforms=selectedPlatforms.filter(p=>p!==plt);
  else selectedPlatforms.push(plt);
}
function savePost(){
  const title=document.getElementById('postTitle').value.trim();
  if(!title){toast('请输入标题');return;}
  const posts=load('cal_posts',{});
  if(!posts[selectedDate])posts[selectedDate]=[];
  posts[selectedDate].push({
    id:Date.now(),title,
    status:document.getElementById('postStatus').value,
    platforms:selectedPlatforms,
    note:document.getElementById('postNote').value.trim()
  });
  store('cal_posts',posts);
  closeModal();
  renderCal();
  renderCalDetail(selectedDate);
  toast('已添加 ✓');
}
function delPost(dateKey,id){
  const posts=load('cal_posts',{});
  if(posts[dateKey])posts[dateKey]=posts[dateKey].filter(p=>p.id!=id);
  store('cal_posts',posts);
  renderCal();
  renderCalDetail(dateKey);
  toast('已删除');
}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ══════════════════════════════════════════════════════
// PAGE 4: NOTES
// ══════════════════════════════════════════════════════
let noteType='idea';
const noteTypeMap={idea:{label:'选题灵感',cls:'nb-idea'},obs:{label:'现场观察',cls:'nb-obs'},feel:{label:'感受',cls:'nb-feel'},other:{label:'其他',cls:'nb-other'}};

function setNoteType(btn){
  document.querySelectorAll('.ntbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  noteType=btn.dataset.type;
}
function saveNote(){
  const text=document.getElementById('noteInput').value.trim();
  if(!text){toast('请先输入内容');return;}
  const notes=load('notes',[]);
  notes.unshift({id:Date.now(),text,type:noteType,date:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  store('notes',notes);
  document.getElementById('noteInput').value='';
  renderNotes();
  toast('已记下 ✓');
}
function renderNotes(){
  const notes=load('notes',[]);
  const el=document.getElementById('notesList');
  if(!notes.length){el.innerHTML='<div class="empty"><div class="empty-icon">⚡</div>随手记下你的想法</div>';return;}
  el.innerHTML=notes.map(n=>`
    <div class="note-card">
      <div class="note-type-badge ${noteTypeMap[n.type]?.cls||'nb-other'}">${noteTypeMap[n.type]?.label||'其他'}</div>
      <div class="note-text">${n.text}</div>
      <div class="note-date">${n.date}</div>
      <button class="note-del" onclick="delNote(${n.id})">×</button>
    </div>
  `).join('');
}
function delNote(id){
  let notes=load('notes',[]);
  notes=notes.filter(n=>n.id!=id);
  store('notes',notes);
  renderNotes();
}

// ══════════════════════════════════════════════════════
// PAGE 5: DATA
// ══════════════════════════════════════════════════════
let dataPlt = 'douyin';
let chartMetric = 'fans';

const MILESTONES = [
  { fans: 100,   label: '首个百粉',  icon: '🌱' },
  { fans: 500,   label: '500粉',    icon: '🌿' },
  { fans: 1000,  label: '破千粉',   icon: '⭐' },
  { fans: 5000,  label: '5K粉丝',   icon: '🔥' },
  { fans: 10000, label: '破万粉',   icon: '🚀' },
  { fans: 50000, label: '5万粉丝',  icon: '💎' },
];

function switchDataPlt(btn) {
  document.querySelectorAll('.plt-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  dataPlt = btn.dataset.plt;
  renderDataPage();
}

function switchMetric(btn) {
  document.querySelectorAll('.cm-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  chartMetric = btn.dataset.m;
  renderChart();
}

function getRecords() {
  return load('data_' + dataPlt, []);
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  n = Number(n);
  if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function saveRecord() {
  const date = document.getElementById('recDate').value;
  const fans  = parseInt(document.getElementById('recFans').value)  || 0;
  const views = parseInt(document.getElementById('recViews').value) || 0;
  const likes = parseInt(document.getElementById('recLikes').value) || 0;
  const gain  = parseInt(document.getElementById('recGain').value)  || 0;
  const note  = document.getElementById('recNote').value.trim();

  if (!date) { toast('请选择日期'); return; }

  let recs = getRecords();
  const existing = recs.findIndex(r => r.date === date);
  const entry = { date, fans, views, likes, gain, note, ts: Date.now() };
  if (existing >= 0) recs[existing] = entry;
  else recs.push(entry);
  recs.sort((a, b) => a.date.localeCompare(b.date));
  store('data_' + dataPlt, recs);

  // clear inputs
  ['recFans','recViews','recLikes','recGain','recNote'].forEach(id => {
    document.getElementById(id).value = '';
  });

  renderDataPage();
  toast('数据已保存 ✓');
}

function delRecord(date) {
  let recs = getRecords().filter(r => r.date !== date);
  store('data_' + dataPlt, recs);
  renderDataPage();
  toast('已删除');
}

function renderStatGrid() {
  const recs = getRecords();
  const latest = recs[recs.length - 1];
  const prev   = recs[recs.length - 2];
  const el = document.getElementById('statGrid');

  if (!latest) {
    el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--ink3);font-size:13px;">还没有数据记录</div>';
    return;
  }

  function delta(cur, pre, key) {
    if (!pre) return '';
    const d = (cur[key] || 0) - (pre[key] || 0);
    if (d === 0) return '<span style="font-size:10px;color:var(--ink4);">持平</span>';
    const cls = d > 0 ? 'delta-up' : 'delta-dn';
    return `<span class="sc-delta ${cls}">${d > 0 ? '+' : ''}${fmt(d)}</span>`;
  }

  const totalGain = recs.reduce((s, r) => s + (r.gain || 0), 0);
  const avgViews  = recs.length ? Math.round(recs.reduce((s, r) => s + (r.views || 0), 0) / recs.length) : 0;

  el.innerHTML = `
    <div class="stat-card accent">
      <div class="sc-label">当前粉丝</div>
      <div class="sc-val green">${fmt(latest.fans)}</div>
      ${delta(latest, prev, 'fans')}
      <div class="sc-sub">最近更新 ${latest.date.slice(5)}</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">今日播放</div>
      <div class="sc-val">${fmt(latest.views)}</div>
      ${delta(latest, prev, 'views')}
      <div class="sc-sub">均播 ${fmt(avgViews)}</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">今日点赞</div>
      <div class="sc-val">${fmt(latest.likes)}</div>
      ${delta(latest, prev, 'likes')}
      <div class="sc-sub">记录 ${recs.length} 天</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">累计涨粉</div>
      <div class="sc-val">${fmt(totalGain)}</div>
      <div class="sc-delta ${latest.gain > 0 ? 'delta-up' : ''}">${latest.gain > 0 ? '+' + latest.gain + ' 今日' : '今日未记录'}</div>
      <div class="sc-sub">自开始记录</div>
    </div>
  `;
}

function renderChart() {
  const recs = getRecords();
  const el = document.getElementById('chartWrap');
  if (recs.length < 2) {
    el.innerHTML = '<div class="empty" style="padding:24px 0;">记录至少2天数据后显示趋势图</div>';
    return;
  }

  const show = recs.slice(-30); // last 30 days
  const vals = show.map(r => r[chartMetric] || 0);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const W = Math.max(show.length * 40, 300);
  const H = 120;
  const pad = { t: 10, b: 28, l: 8, r: 8 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;

  const pts = show.map((r, i) => {
    const x = pad.l + (i / (show.length - 1)) * plotW;
    const y = pad.t + (1 - (r[chartMetric] || 0 - minV) / range) * plotH;
    return { x, y, r };
  });

  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1].x.toFixed(1)},${(pad.t+plotH).toFixed(1)} L${pts[0].x.toFixed(1)},${(pad.t+plotH).toFixed(1)} Z`;

  const labels = show.map((r, i) => {
    if (i === 0 || i === show.length - 1 || i % Math.ceil(show.length / 5) === 0) {
      return `<text x="${pts[i].x.toFixed(1)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#888">${r.date.slice(5)}</text>`;
    }
    return '';
  }).join('');

  const dots = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--g)" stroke="white" stroke-width="1.5"/>`).join('');

  el.innerHTML = `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--g)" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="var(--g)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#chartGrad)"/>
      <path d="${linePath}" fill="none" stroke="var(--g)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${labels}
    </svg>
  `;
}

function renderMilestones() {
  const recs = getRecords();
  const latest = recs[recs.length - 1];
  const curFans = latest ? (latest.fans || 0) : 0;
  const el = document.getElementById('milestoneList');

  el.innerHTML = MILESTONES.map(ms => {
    const done = curFans >= ms.fans;
    const pct = Math.min(100, Math.round((curFans / ms.fans) * 100));
    return `
      <div class="milestone-item">
        <div class="ms-icon">${done ? ms.icon : '○'}</div>
        <div class="ms-info">
          <div class="ms-label" style="${done ? 'color:var(--g);font-weight:600;' : ''}">${ms.label}</div>
          <div class="ms-val">${done ? '✓ 已达成' : `${fmt(curFans)} / ${fmt(ms.fans)}  (${pct}%)`}</div>
        </div>
        <div class="ms-progress">
          <div class="ms-bar" style="width:${pct}%;background:${done ? 'var(--g)' : 'var(--g3)'};"></div>
        </div>
      </div>
    `;
  }).join('');
}

function renderRecTable() {
  const recs = getRecords().slice().reverse(); // newest first
  const el = document.getElementById('recTableBody');
  const cnt = document.getElementById('recCount');
  cnt.textContent = recs.length + ' 条';

  if (!recs.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;">还没有记录</div>';
    return;
  }

  el.innerHTML = recs.map(r => `
    <div class="rec-row">
      <div class="rec-date-col">${r.date.slice(5)}</div>
      <div class="rec-num">${fmt(r.fans)}</div>
      <div class="rec-num">${fmt(r.views)}</div>
      <div class="rec-num">${fmt(r.likes)}</div>
      <button class="rec-del-btn" onclick="delRecord('${r.date}')">×</button>
    </div>
    ${r.note ? `<div style="padding:0 14px 8px;font-size:11px;color:var(--ink3);">💬 ${r.note}</div>` : ''}
  `).join('');
}

function renderDataPage() {
  renderStatGrid();
  renderChart();
  renderMilestones();
  renderRecTable();
}

// set today's date in picker
function initDataPage() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('recDate').value = today;
  renderDataPage();
}

// ── INIT ──────────────────────────────────────────────
renderFilterBar();
renderShots();
renderCal();
renderNotes();
renderSaved();
initDataPage();
</script>
